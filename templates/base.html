<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | سامانه پرستاری</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/dist/font-face.css" rel="stylesheet" type="text/css" />
    <style>
        body { font-family: Vazirmatn, sans-serif; overflow-x: hidden; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        #sidebar { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="text-slate-800">
    <div id="overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 right-0 z-50 w-72 bg-slate-900 text-slate-100 flex flex-col shadow-2xl transform translate-x-full lg:translate-x-0">
        <div class="p-6 border-b border-slate-800">
            <div class="flex items-center gap-3 justify-center mb-4">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xl">🏥</div>
                <h1 class="text-xl font-bold tracking-tight">دفتر پرستاری</h1>
            </div>
            <div class="text-center py-2 px-3 bg-slate-800/50 rounded-lg border border-slate-700">
                <span class="text-xs text-slate-400 block mb-1">شیفت جاری</span>
                <span class="text-sm font-medium text-emerald-400">{{ current_shift }}</span>
            </div>
        </div>
        
        <nav class="flex-1 overflow-y-auto p-4 space-y-1 custom-scrollbar">
            {% for menu in user_menus %}
            <a href="{{ menu.url }}" class="flex items-center px-4 py-3 rounded-xl hover:bg-blue-600/10 hover:text-blue-400 transition-all group">
                <span class="ml-3 text-xl group-hover:scale-110 transition-transform">{{ menu.icon | safe }}</span>
                <span class="text-sm font-semibold">{{ menu.title }}</span>
            </a>
            {% endfor %}
        </nav>

        <div class="p-4 border-t border-slate-800">
            <a href="/logout" class="flex items-center justify-between px-4 py-3 bg-red-500/10 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition-all">
                <span class="text-sm font-bold">خروج از حساب</span>
                <span>🚪</span>
            </a>
        </div>
    </aside>

    <div class="lg:mr-72 min-h-screen flex flex-col">
        <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-30 flex items-center justify-between px-6">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-slate-100 rounded-lg">
                <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            
            <div class="flex items-center gap-4">
                <div class="hidden md:block text-left border-l pl-4 border-slate-200 text-sm text-slate-500 font-medium">
                    {{ today_date }}
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm font-bold text-slate-700">{{ session.get('user_name', 'پنل مدیریت') }}</span>
                    <div class="w-9 h-9 rounded-full bg-blue-100 border border-blue-200 flex items-center justify-center text-blue-600 font-bold">👤</div>
                </div>
            </div>
        </header>

        <main class="p-4 lg:p-8 flex-1">
            <div class="max-w-[1400px] mx-auto">
                {{ main_content | safe }}
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
        }
		
	<script src="/static/js/shamsi_date.js"></script>		
    </script>
</body>
</html>
